negative_findings:
  - id: NF1
    statement: "No same-key CONFLICT arose against the independent INCUMBENT brand vocabulary (Aaker) — an informative absence: it is evidence that SBT's qualified naming converts would-be same-key conflicts into curated cross-key mappings, not a failed experiment. The CONFLICT class required a DIFFERENT-DISCIPLINE homonym (Spence `signal`) to arise."
    expected_observation: "A same-key CONFLICT if naive shared naming were used."
    source_method: M1
    affects_nodes: [F3, P2]
    motivates: [F4]
    provenance:
      created_by: "author"
      created_at: "2026-06-18"
    body_sections: ["Evaluation — Case 2", "Discussion"]
  - id: NF2
    statement: "To our knowledge no prior work frames ontology/vocabulary alignment as a compile/link-time check, nor transfers a software link-time compatibility check to terminology integration. Stated defensively (Gemini grounding found none), never as proven non-existence."
    expected_observation: "A prior compile/link-time vocabulary-compatibility check, if one existed."
    source_method: "Phase-1 + Phase-2 DR literature search (Gemini grounding + Crossref verification)"
    affects_nodes: [P1, P2]
    motivates: [P1]
    provenance:
      created_by: "ai:gemini-2.5-pro+seed:N/A+prompt_anchor:[internal audit artifact]"
      created_at: "2026-06-18"
    body_sections: ["Related Work — Positioning"]

# ---------------------------------------------------------------------------
# Assumption atoms
# ---------------------------------------------------------------------------
assumption_atoms:
  - id: AA1
    statement: "A term's trimmed definition string validly carries its intensional meaning for identity purposes, so sha256(definition) is a sound identity test for 'same definition'."
    type: "measurement_validity"
    relaxable: true
    relaxation_consequence: "If meaning-preserving paraphrases must count as the same identity, def_hash over-discriminates and a normalization/embedding layer is needed; the partition and gate are unaffected, only the AGREEMENT/CONFLICT boundary shifts."
    affects: [M1, P1, P3]
    provenance:
      created_by: "author"
      created_at: "2026-06-18"
    body_sections: ["Method — Content-Addressed Identity", "Threats to Validity"]
  - id: AA2
    statement: "Each author honestly declares owns/imports/refines (with narrows_to on refines): the module discipline (one owner per term; refine carries an explicit narrowing) is followed."
    type: "data_source_trust"
    relaxable: true
    relaxation_consequence: "A refine without narrows_to is exactly the INCOMPATIBLE_REFINE guard class; a missing owner is DANGLING_IMPORT. Violations surface AS unresolved classes rather than corrupting the classification."
    affects: [M1, F5]
    provenance:
      created_by: "author"
      created_at: "2026-06-18"
    body_sections: ["Method — Module Schema"]

