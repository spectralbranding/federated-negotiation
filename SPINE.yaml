spine_version: "0.2"
paper_key: "federated-negotiation"
title: "Negotiating Vocabularies at Link Time: A Deterministic Six-Class Compatibility Check for Federated Ontology Modules"
thesis: |
  The link-time compatibility check that compilers and package managers apply to code
  — refuse to build when two components make incompatible demands on a shared symbol,
  and name exactly which two disagree — transfers to scholarly vocabularies. If each
  work declares the terms it owns, imports, and refines as a small content-addressed
  module, a federated linker classifies every cross-author interaction into exactly one
  of six classes (AGREEMENT, CROSS_IMPORT, CROSS_REFINE, CONFLICT, INCOMPATIBLE_REFINE,
  DANGLING_IMPORT), proposes a typed and justified SSSOM reconciliation, and fails a
  continuous-integration gate on the three unresolved classes — before either author
  reads the other's prose. The classification is a deterministic pure function of two
  parsed module sets grounded in content-addressed definition-hash identity; it occupies
  the zero-uncertainty, syntactic/element-level corner of the ontology-matching space and
  adds the interaction-classification + reconciliation-operation + CI-gate layer that the
  matching literature leaves to post-hoc human judgment. The paper formalizes the
  taxonomy, implements it as a dependency-light reference tool, and evaluates it on three
  real, independent vocabulary pairs that together exercise the full interaction-class set.

# ---------------------------------------------------------------------------
# Boundary conditions (cannot be relaxed — the method does not apply outside them)
# ---------------------------------------------------------------------------
boundary_conditions:
  - id: C1
    statement: "Each vocabulary is expressed as a module with machine-readable intensional definitions — owned terms each carry a definition string from which a content-addressed def_hash is computed. Excludes vocabularies with no written definitions (key-only term lists) and purely procedural / free-text scholarly artifacts."
  - id: C2
    statement: "Identity is per-term and content-addressed: a term's identity is the sha256 of its trimmed definition. Two terms are 'the same' iff their def_hash is byte-identical. The method classifies INTERACTIONS, not semantic similarity across differing keys (cross-key synonymy is out of scope; it requires an embedding-assist or human-curation layer)."
  - id: C3
    statement: "There exist owners: every term is owned by exactly one module (the introducing work); imports/refines reference owned terms. A 'federation' is two namespaced module sets from two distinct authorities (cross-temporal-self counts as the degenerate single-author case)."
  - id: C4
    statement: "The reconciliation semantics (lock/fork/rebase/merge) and the fail-the-build CI gate presuppose an ecosystem that runs a continuous-integration gate over its vocabulary. Domains where fork/rebase semantics damage cumulative reference (e.g. legal or regulatory ontologies whose identifiers must never re-point) are out of scope for the gate, though the classification still applies."

