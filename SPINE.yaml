# Findings — what is the case
# ---------------------------------------------------------------------------
findings:
  - id: F1
    statement: "On all six module pairs the linker assigned every cross-owner interaction to exactly one of the six classes and terminated with a clean/NOT-clean verdict; no interaction was left unclassified and the tool did not error on real modules (mechanizability). Coverage spans five real, independent vocabulary pairs (SBT/OST, SBT/Aaker, SBT/Spence, GO/annotator, CIDOC-CRM/spectrometer) plus the engineered AGREEMENT fixture."
    source_method: M1
    antecedents: [O1, O2, O3, O4, O5, O6, M1]
    statistical_strength: "deterministic; existence-proof / case-study, not statistical (6 pairs: 5 real + 1 fixture)"
    conditions: "C1, C2, C3"
    falsifier: "Any cross-owner interaction left unclassified, or the tool erroring on a well-formed module pair, refutes F1."
    citation_role: ["motivation_for_P1"]
    provenance:
      created_by: "tool:negotiate_modules.py"
      created_at: "2026-06-14"
    body_sections: ["Evaluation — Results"]
  - id: F2
    statement: "The clean case (SBT<->OST) produced 4 CROSS_IMPORT + 2 CROSS_REFINE and 0 unresolved interactions: --gate passes (exit 0). A clean intra-author federation still requires explicit CROSS_REFINE narrowMatch reconciliation to remain machine-actionable."
    source_method: M1
    antecedents: [O1, M1]
    statistical_strength: "single deterministic run; byte-reproducible"
    conditions: "C1, C2, C3, C4"
    falsifier: "An unresolved interaction in the by-construction-clean intra-author pair would refute F2 (and the 'one author = rebase against past self' account)."
    provenance:
      created_by: "tool:negotiate_modules.py"
      created_at: "2026-06-13"
    body_sections: ["Evaluation — Case 1"]
  - id: F3
    statement: "The independent-incumbent case (SBT<->Aaker) produced the first genuine --gate-failing adversarial class on real corpora — 2 DANGLING_IMPORT (brand, consumer: base primitives the incumbent presupposes but neither ontology owns) — and 0 same-key CONFLICT, because SBT's deliberately-qualified naming (perception-cloud not 'brand image'; brand-conviction not 'brand attitude') forecloses bare-key collisions. The genuine SBT<->incumbent correspondences are cross-key and invisible to the key-based linker (captured only by a hand-authored curated SSSOM)."
    source_method: M1
    antecedents: [O2, M1, M3]
    statistical_strength: "single deterministic run + integrity-manifest tamper check"
    conditions: "C1, C2, C3"
    falsifier: "A clean federation (no adversarial class) OR a same-key CONFLICT in this pair would refute F3 and the qualified-naming account respectively."
    citation_role: ["motivation_for_P2"]
    provenance:
      created_by: "tool:negotiate_modules.py"
      created_at: "2026-06-14"
    body_sections: ["Evaluation — Case 2"]
  - id: F4
    statement: "The cross-disciplinary case (SBT<->Spence) produced a genuine same-key CONFLICT on the bare term `signal` (identical key, content-divergent def_hash) classified 'same label, divergent definition' with a skos:closeMatch @ confidence .5 flagged semapv:ManualMappingCuration, plus 1 DANGLING_IMPORT (labor-market): --gate exit 1. Cross-disciplinary homonymy is the condition SBT's qualified naming cannot foreclose, so the CONFLICT class arises honestly."
    source_method: M1
    antecedents: [O3, M1, M3]
    statistical_strength: "single deterministic run + integrity-manifest tamper check"
    conditions: "C1, C2, C3"
    falsifier: "If the two `signal` definitions hashed equal (an AGREEMENT) or the overlap were not classified as same-label CONFLICT, F4 is refuted."
    citation_role: ["motivation_for_P2"]
    provenance:
      created_by: "tool:negotiate_modules.py"
      created_at: "2026-06-14"
    body_sections: ["Evaluation — Case 3"]
  - id: F5
    statement: "Across the six pairs the six classes partition the observed interactions and the gate is sound on the three unresolved classes: every emitted finding carried exactly one class, predicate, and operation; --gate exited nonzero on exactly the pairs containing CONFLICT/INCOMPATIBLE_REFINE/DANGLING_IMPORT (Aaker, Spence, GO/annotator, fixture) and zero on the clean pairs (SBT/OST, CIDOC-CRM/spectrometer). Cases 4 and 5 extend the existing classes to larger cross-domain standards — DANGLING_IMPORT at OBO scale grounded in GO's term-obsoletion governance (8 CROSS_IMPORT + 2 DANGLING) and CROSS_IMPORT at 3x Case-1 volume on CIDOC-CRM (12 CROSS_IMPORT + 1 CROSS_REFINE) — not a new class. The engineered fixture additionally realizes AGREEMENT (identical def_hash); INCOMPATIBLE_REFINE has no real-case instance because the module schema requires a narrows_to on every refine — it is a guard the well-formed-module discipline forecloses."
    source_method: M2
    antecedents: [O1, O2, O3, O4, O5, O6, M2]
    statistical_strength: "deterministic partition over 6 pairs; coverage = 5/6 classes on real data, 6/6 including the engineered AGREEMENT fixture"
    conditions: "C1, C2, C3, C4"
    falsifier: "An interaction assignable to two classes, or a >X% rate of unclassifiable 'seventh-class' interactions on real pairs in the wild, would refute the partition (P1's general-claim falsifier)."
    provenance:
      created_by: "tool:negotiate_modules.py"
      created_at: "2026-06-14"
    body_sections: ["Method — Partition and Gate Soundness", "Evaluation — Class Coverage"]

# ---------------------------------------------------------------------------
# Propositions — why is it the case (the theoretical claims)
# ---------------------------------------------------------------------------
propositions:
  - id: P1
    statement: "Cross-author terminological incompatibility in scholarship can be surfaced, classified, and assigned a reconciliation operation mechanically — at link time, before either author reads the other's prose — by a total classification function over two content-addressed module sets whose six classes partition every cross-owner interaction."
    type: ontological
    conditions: "C1, C2, C3"
    antecedents: [F1, F5]
    assumptions: [AA1, AA2]
    falsifier: "If more than a small fraction of real, well-formed scholarly vocabulary pairs in the wild contain a cross-owner interaction that the six classes cannot uniquely classify (an unclassifiable seventh class), the taxonomy is falsified."
    evidence:
      - type: code_anchor
        anchor: "negotiate_modules.py classify() — a pure function of two parsed module sets; def_hash content-addressing"
      - type: log_anchor
        anchor: "F1 (every interaction classified, no errors) + F5 (partition + gate soundness across 4 pairs)"
      - type: citation
        anchor: "the matching problem and its element-level/syntactic corner; this method occupies the zero-uncertainty vertex"
        citation_keys: [euzenat-shvaiko-2013-ontology-matching, rahm-bernstein-2001-schema-matching-survey]
        citation_role: theoretical_predecessor
    body_sections: ["Introduction", "Method — Formal Core", "Discussion"]
    provenance:
      created_by: "author"
      created_at: "2026-06-18"
  - id: P2
    statement: "The deterministic key+content-hash linker occupies a deliberately degenerate (zero-uncertainty) point of the ontology-matching space — syntactic, element-level, verification rather than discovery — and contributes the layer the matching literature leaves to post-hoc human judgment: interaction-classification + typed SKOS/SSSOM reconciliation + a fail-the-build CI gate. It does not compete with OAEI-style similarity/learned matchers; it is the zero-uncertainty baseline against which learned reconciliation methods are measured."
    type: ontological
    conditions: "C1, C2"
    antecedents: [F3, F4, F5]
    falsifier: "If the classification or gate required a similarity threshold / probabilistic score to decide a class (i.e. were not a deterministic function of def_hash equality and declared import/refine edges), P2's zero-uncertainty positioning fails."
    evidence:
      - type: log_anchor
        anchor: "F3 (Aaker DANGLING + cross-key invisibility), F4 (Spence same-key CONFLICT via def_hash divergence) — both decided with no similarity scoring"
      - type: citation
        anchor: "matching families (string/structural/instance/logic/learned) + SSSOM as the interchange format + OAEI as the evaluation campaign the method does not compete in"
        citation_keys: [euzenat-shvaiko-2013-ontology-matching, shvaiko-euzenat-2021-oaei-results, matentzoglu-2022-sssom, miles-bechhofer-2009-skos-reference]
        citation_role: theoretical_predecessor
      - type: citation
        anchor: "the learned/background-knowledge branch this method deliberately defers and is the baseline for"
        citation_keys: [portisch-2023-background-knowledge-matching]
        citation_role: contrast_case
    ruled_out_rivals: [A1]
    body_sections: ["Related Work — Positioning", "Related Work — Learned vs Deterministic", "Discussion"]
    provenance:
      created_by: "author"
      created_at: "2026-06-18"
  - id: P3
    statement: "Content-addressed definition-hash identity gives the 'changed definition ⇒ new identity' rule mechanically and automatically: a term's identity is the byte-hash of its definition, so a substantive definitional change yields a new identity with no human identifier-minting. This is the automatic, byte-exact strengthening of the OBO Foundry policy that a changed definition warrants a new identifier."
    type: ontological
    conditions: "C2"
    antecedents: [F4, M3]
    falsifier: "If two definitions that a human judges substantively different hash equal (a meaning-preserving paraphrase aside), or the identity rule required manual minting, P3 fails."
    evidence:
      - type: log_anchor
        anchor: "F4: the two `signal` definitions hash differently → distinct identities → CONFLICT, with no human ID assignment; M3 integrity manifest reproduces the hashes"
      - type: citation
        anchor: "OBO Foundry Principle 19 'Stability of Term Meaning' — a definitional change warrants a new IRI; content-addressing makes this automatic"
        citation_keys: [smith-2007-obo-foundry, jackson-2021-obo-foundry-in-2021]
        citation_role: theoretical_predecessor
      - type: citation
        anchor: "content-addressed / Merkle identity; verifiable immutable linked-data artifacts"
        citation_keys: [merkle-1988-digital-signature, kuhn-2014-trusty-uris]
        citation_role: canonical_reference
    body_sections: ["Method — Content-Addressed Identity", "Related Work — Identity and Versioning"]
    provenance:
      created_by: "author"
      created_at: "2026-06-18"
  - id: P4
    statement: "Recent conflict-resolution work (continuous/collaborative ontology engineering; learned/LLM knowledge-graph conflict resolution; RAG inter-context-conflict benchmarks) DETECTS or LEARNS conflicts post-hoc; the link-time linker PREVENTS their propagation deterministically at install time. The delta is preventive-vs-detective and deterministic-vs-learned, not a better matcher."
    type: ontological
    conditions: "C1, C3, C4"
    antecedents: [F5]
    falsifier: "If a cited nearest-neighbor already performs deterministic link-time interaction-classification with typed reconciliation on author-declared modules, the novelty delta collapses."
    evidence:
      - type: citation
        anchor: "nearest neighbors that detect/learn conflicts post-hoc — the precise delta is deterministic prevention at link time"
        citation_keys: [salamon-2026-continuous-ontology-engineering, lee-2025-magic-rag-conflict-benchmark, portisch-2023-background-knowledge-matching]
        citation_role: contrast_case
    body_sections: ["Related Work — Learned vs Deterministic"]
    provenance:
      created_by: "author"
      created_at: "2026-06-18"
  - id: P5
    statement: "The method is a strict generalization of the single-author ontology linker: the single-author case is the degenerate federation where the two authors are one person at two times and the 'negotiation' collapses to a rebase against one's own past self. The same parser reads modules in both regimes, so the single-author linker and the federated linker can never disagree on how a module is read or a definition hashed."
    type: rendering_equivalence
    conditions: "C2, C3"
    antecedents: [F1, F2]
    falsifier: "If the federated linker parsed a module differently from the single-author linker (different def_hash or owns/imports/refines reading), P5 fails."
    evidence:
      - type: code_anchor
        anchor: "negotiate_modules.py imports build_ontology.Module + def_hash + _norm_ref — one parser, two regimes"
      - type: log_anchor
        anchor: "F2 clean SBT/OST intra-author federation = rebase-against-past-self regime"
      - type: citation
        anchor: "the parent infrastructure paper: research-as-repository, 'negotiate a paper before you read it'"
        citation_keys: [zharnikov-2026-research-as-repository-git-native]
        citation_role: theoretical_predecessor
    body_sections: ["Method — Relation to the Single-Author Linker", "Introduction"]
    provenance:
      created_by: "author"
      created_at: "2026-06-18"

# ---------------------------------------------------------------------------
# Derivations — reasoning bridges
# ---------------------------------------------------------------------------
derivations:
  - id: D1
    statement: "Partition + gate soundness: because each interaction is decided by mutually-exclusive, exhaustive conditions over (shared-key def_hash equality; refine with/without narrows_to; import owned-by-other/neither), classify is a total function onto six disjoint classes; the gate is sound w.r.t. the three classes whose reconciliation is not yet authored (CONFLICT/INCOMPATIBLE_REFINE/DANGLING_IMPORT), so a passing gate certifies a linkable federation."
    from: [P1]
    to: "gate-soundness proposition"
    reasoning_type: "formal_proof"
    formal_proof_anchor: "code/negotiate_modules.py (negotiate); proof sketch in Method — Partition and Gate Soundness"
    provenance:
      created_by: "author"
      created_at: "2026-06-18"
    body_sections: ["Method — Partition and Gate Soundness"]

# ---------------------------------------------------------------------------
# Alternative explanations (rivals)
# ---------------------------------------------------------------------------
alternative_explanations:
  - id: A1
    statement: "The contribution is 'yet another ontology matcher' that should be benchmarked on OAEI tracks and compared to similarity/learned systems on precision/recall."
    rules_out_required: [F5]
    ruled_out_by: [F5]
    rules_out_status: "rejected"
    reasoning: "The method asserts no similarity scores and discovers no candidate matches: it classifies declared interactions and verifies def_hash identity. It occupies the zero-uncertainty vertex of the matching space (P2) and adds classification+reconciliation+gate, a layer orthogonal to OAEI precision/recall. Benchmarking it as a matcher is a category error."
    provenance:
      created_by: "author"
      created_at: "2026-06-18"
    body_sections: ["Related Work — Positioning", "Discussion"]

