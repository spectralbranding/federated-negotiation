# ---------------------------------------------------------------------------
# Limitations
# ---------------------------------------------------------------------------
limitations:
  - id: L1
    statement: "All three real module sets are AUTHOR-TRANSCRIBED: the SBT author transcribed the incumbent Aaker and cross-disciplinary Spence vocabularies from published sources, and each conflict is resolved only as a tool-PROPOSED curation. The independence is in each vocabulary's provenance, not yet in a living co-author's authoring act."
    affects: [F3, F4, P1]
    severity: "high"
    mitigation: "State explicitly; quantify the transcription effort; name an automated-extraction path (definition extraction from published text) as future work; scope the claim to 'the mechanism + coverage of the class set on real vocabularies', NOT validated multi-author social adoption."
    provenance:
      created_by: "author"
      created_at: "2026-06-18"
    body_sections: ["Threats to Validity", "Limitations and Future Work"]
  - id: L2
    statement: "The key-based linker surfaces same-key collisions and explicit import/refine edges; it does NOT detect latent cross-key synonymy (e.g. perception-cloud vs brand-image). The genuine SBT<->incumbent correspondences had to be hand-authored as a curated SSSOM. Cross-key reconciliation requires an embedding-assist or human-curation layer, deliberately out of scope."
    affects: [F3, P2]
    severity: "medium"
    mitigation: "Name as a scope boundary (C2) not a defect; the curated cross-key SSSOM is the artifact the manual-curation layer accounts for; learned cross-key matching is future work."
    provenance:
      created_by: "author"
      created_at: "2026-06-18"
    body_sections: ["Scope and Boundary Conditions", "Threats to Validity"]
  - id: L3
    statement: "Five hand-curated cases are an existence proof of full class coverage on real vocabularies, not a full-ontology robustness benchmark; the two added pairs (GO DANGLING at OBO scale, CIDOC-CRM CROSS_IMPORT at volume) transcribe representative 12-13-term slices, not whole ontologies. Full-ontology scale (thousands of terms) and transcription bias remain real external-validity threats the lead reviewer will raise."
    affects: [F5, P1]
    severity: "medium"
    mitigation: "Frame as existence-proof/case-study (not statistical); the two committed scale/volume pairs are DELIVERED (Cases 4-5, O5/O6); a full-ontology run + automated definition extraction remain future work; report runtime is linear in term count (set intersection)."
    provenance:
      created_by: "author"
      created_at: "2026-06-18"
    body_sections: ["Threats to Validity", "Limitations and Future Work"]

