# ---------------------------------------------------------------------------
# Methods
# ---------------------------------------------------------------------------
methods:
  - id: M1
    statement: "The classification function classify(M_A, M_B): parse both authors' modules with the SAME parser the single-author linker uses (build_ontology.Module + def_hash + _norm_ref); index each author into owns{term_key->def_hash} / imports{} / refines{term_key->narrows_to}; assign every cross-owner interaction to exactly one of six classes by a fixed decision rule over (shared-key equality of def_hash, refine-with/without-narrows_to, import-owned-by-other/neither)."
    type: "formal_derivation"
    inputs: [O1, O2, O3, O4]
    outputs: [F1, F2, F3, F4]
    code_anchor: "code/negotiate_modules.py (negotiate / index_author); code/build_ontology.py (Module, def_hash)"
    reproducibility:
      seed: "deterministic — no RNG; def_hash = sha256(trimmed definition); classify is a pure function of two parsed module sets"
      version: "v1.0.0"
      runtime_environment: "Python 3.12 + uv; no network, no credentials"
    cost: "$0 (no API calls)"
    provenance:
      created_by: "author"
      created_at: "2026-06-13"
    body_sections: ["Method — Formal Core", "Method — The Six Interaction Classes"]
  - id: M2
    statement: "The reconciliation + gate map: each class is assigned (a) a SKOS mapping predicate, (b) a reconciliation operation in {lock, fork, rebase, merge} lifted from the single-author lock/fork/rebase/merge vocabulary, (c) an SSSOM justification (semapv:LexicalMatching for mechanical hash/lexical matches, semapv:ManualMappingCuration for proposals a human must confirm) + confidence, and (d) gate semantics: the three unresolved classes (CONFLICT, INCOMPATIBLE_REFINE, DANGLING_IMPORT) fail --gate."
    type: "formal_derivation"
    inputs: [O1, O2, O3, O4]
    outputs: [F5]
    code_anchor: "code/negotiate_modules.py (PREDICATE, OPERATION, UNRESOLVED, render_sssom)"
    reproducibility:
      seed: "deterministic"
      version: "v1.0.0"
    provenance:
      created_by: "author"
      created_at: "2026-06-13"
    body_sections: ["Method — Reconciliation and Gate Semantics"]
  - id: M3
    statement: "Integrity manifest: each shared SBT term's def_hash (sha256 truncated to 16 hex) is recomputed at run time and checked equal to the live ontology graph value — the deterministic-experiment analogue of a fixed random seed (tamper-evidence anchor)."
    type: "verification_cascade"
    inputs: [O2, O3]
    code_anchor: "code/build_ontology.py (def_hash); per-experiment integrity-manifest tables"
    reproducibility:
      seed: "deterministic; hashes reproduce byte-identically"
      version: "v1.0.0"
    provenance:
      created_by: "tool:build_ontology.py"
      created_at: "2026-06-14"
    body_sections: ["Method — Reproducibility (Integrity Manifest)"]

