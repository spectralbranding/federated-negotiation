# Gene Ontology (GO) author module for the OBO-SCALE federated
# ontology-negotiation experiment (Case 4: DANGLING_IMPORT under OBO Principle 19).
#
# "GO, the OBO-Foundry incumbent author": owns a faithful, sourced slice of the
# Gene Ontology -- the canonical, large-scale OBO Foundry biomedical ontology
# (the original OBO ontology; the namesake of the Foundry). GO is GENUINELY
# INDEPENDENT of this corpus: it is a community ontology maintained by the Gene
# Ontology Consortium since 2000, has its own published governance, and was not
# authored to be compatible with SBT/OST in any way.
#
# Definitions are FAITHFUL TRANSCRIPTIONS of the real GO term definitions as
# served by the EBI QuickGO term API (https://www.ebi.ac.uk/QuickGO/), each term
# carrying its real, stable GO ID in the `note`. They are transcribed by the SBT
# author from the published ontology -- NOT authored by the GO Consortium itself
# (see the experiment record's limitations). Sources:
#   - Ashburner, M., Ball, C. A., Blake, J. A., et al. (2000). "Gene Ontology:
#     tool for the unification of biology." Nature Genetics, 25(1), 25-29.
#     DOI: 10.1038/75556  -- the foundational GO paper.
#   - The Gene Ontology Consortium (2026). "The Gene Ontology knowledgebase in
#     2026." Nucleic Acids Research, 54(D1), D1779-D1792.
#     DOI: 10.1093/nar/gkaf1292 -- current release + the obsoletion / `replaced_by`
#     policy this experiment exercises.
#   - Term definitions: EBI QuickGO services API
#     (https://www.ebi.ac.uk/QuickGO/services/ontology/go/terms/<GO_ID>),
#     CIDOC-independent, retrieved 2026-06-18.
#
# OBO PRINCIPLE 19 ("term meaning stability" / changed-definition => new ID) is
# the load-bearing fact of this experiment. The GO Consortium does NOT silently
# mutate a term's meaning: when a term goes out of scope or is mis-defined, the
# term is OBSOLETED (its ID persists, tagged obsolete, all relations stripped),
# and -- since 2022 -- a successor is referenced via the `replaced_by` OBO tag
# rather than a silent merge. The content-addressed def_hash of negotiate_modules
# is the byte-exact automatic form of exactly this policy: a changed definition is
# automatically a NEW identity. This GO slice owns only its CURRENT, active terms;
# it does NOT own the obsoleted IDs (GO:0000005, GO:0006350) that the annotator
# module still imports -> a genuine, OBO-grounded DANGLING_IMPORT at realistic scale.
#
# Deliberately NOT named ONTOLOGY.yaml and NOT a discovered ontology module, so the
# live build_ontology.py linker never picks it up. Loaded explicitly by
# negotiate_modules.py via --author-a. See ../README.md

paper_key: go_real
schema_version: 0.1

owns:
  # ---- Gene Ontology: current, active terms (faithful transcriptions) ----
  # Term keys are GO-namespaced kebab labels; the real GO ID is in the `note`.
  - term_key: go-molecular-function
    label: "molecular_function"
    canonical_form: "molecular function"
    definition: "A molecular process that can be carried out by the action of a single macromolecular machine, usually via direct physical interactions with other molecular entities. Function in this sense denotes an action, or activity, that a gene product (or a complex) performs."
    first_section: "GO:0003674"
    note: "GO:0003674 molecular_function (one of the three top-level GO aspects); def. via QuickGO API."

  - term_key: go-biological-process
    label: "biological_process"
    canonical_form: "biological process"
    definition: "A biological process is the execution of a genetically-encoded biological module or program. It consists of all the steps required to achieve the specific biological objective of the module. A biological process is accomplished by a particular set of molecular functions carried out by specific gene products, and is often regulated."
    first_section: "GO:0008150"
    note: "GO:0008150 biological_process (top-level GO aspect); def. via QuickGO API."

  - term_key: go-cellular-component
    label: "cellular_component"
    canonical_form: "cellular component"
    definition: "A location, relative to cellular compartments and structures, occupied by a macromolecular machine. There are three types of cellular components described in the gene ontology: the cellular anatomical entity where a gene product carries out a molecular function, virion components, and the protein-containing complexes."
    first_section: "GO:0005575"
    note: "GO:0005575 cellular_component (top-level GO aspect); def. via QuickGO API."

  - term_key: go-catalytic-activity
    label: "catalytic activity"
    canonical_form: "catalytic activity"
    definition: "Catalysis of a biochemical reaction at physiological temperatures. In biologically catalysed reactions, the reactants are known as substrates, and the catalysts are naturally occurring macromolecular substances known as enzymes. Enzymes possess specific binding sites for substrates, and are usually composed wholly or largely of protein, but RNA that has catalytic activity (ribozyme) is often also regarded as enzymatic."
    first_section: "GO:0003824"
    note: "GO:0003824 catalytic activity (a molecular_function child); def. via QuickGO API."

  - term_key: go-binding
    label: "binding"
    canonical_form: "binding"
    definition: "The selective, non-covalent, often stoichiometric, interaction of a molecule with one or more specific sites on another molecule."
    first_section: "GO:0005488"
    note: "GO:0005488 binding (a molecular_function child); def. via QuickGO API."

  - term_key: go-transporter-activity
    label: "transporter activity"
    canonical_form: "transporter activity"
    definition: "Enables the directed movement of substances (such as macromolecules, small molecules, ions) into, out of or within a cell, or between cells."
    first_section: "GO:0005215"
    note: "GO:0005215 transporter activity (a molecular_function child); def. via QuickGO API."

  - term_key: go-dna-templated-transcription
    label: "DNA-templated transcription"
    canonical_form: "DNA-templated transcription"
    definition: "The synthesis of an RNA transcript from a DNA template."
    first_section: "GO:0006351"
    note: "GO:0006351 DNA-templated transcription -- the CURRENT, active term that the obsoleted GO:0006350 'transcription' was replaced by (replaced_by, 2022+). def. via QuickGO API."

  - term_key: go-protein-binding
    label: "protein binding"
    canonical_form: "protein binding"
    definition: "Binding to a protein."
    first_section: "GO:0005515"
    note: "GO:0005515 protein binding (a binding child); def. via QuickGO API."

  - term_key: go-cytoplasm
    label: "cytoplasm"
    canonical_form: "cytoplasm"
    definition: "The contents of a cell excluding the plasma membrane and nucleus, but including other subcellular structures."
    first_section: "GO:0005737"
    note: "GO:0005737 cytoplasm (a cellular_component child); def. via QuickGO API."

  - term_key: go-membrane
    label: "membrane"
    canonical_form: "membrane"
    definition: "A lipid bilayer along with all the proteins and protein complexes embedded in it and attached to it."
    first_section: "GO:0016020"
    note: "GO:0016020 membrane (a cellular_component child); def. via QuickGO API."

  - term_key: go-signal-transduction
    label: "signal transduction"
    canonical_form: "signal transduction"
    definition: "The cellular process in which a signal is conveyed to trigger a change in the activity or state of a cell. Signal transduction begins with reception of a signal (e.g. a ligand binding to a receptor or receptor activation by a stimulus such as light), or for signals within the cell, signal transduction begins with the activation of an effector (e.g. activation of a protein kinase by a second messenger), and ends with regulation of a downstream cellular process, e.g. regulation of transcription or regulation of a metabolic process."
    first_section: "GO:0007165"
    note: "GO:0007165 signal transduction (a biological_process child); def. via QuickGO API. NB: GO's `signal` sense is intracellular biochemical signalling -- distinct from both SBT's brand-signal and Spence's market-signal senses."

  - term_key: go-immune-response
    label: "immune response"
    canonical_form: "immune response"
    definition: "Any immune system process that functions in the calibrated response of an organism to a potential internal or invasive threat."
    first_section: "GO:0006955"
    note: "GO:0006955 immune response (a biological_process child); def. via QuickGO API."

imports: []
refines: []
# GO predates and is independent of this corpus; it owns only its own current
# terms and imports/refines NOTHING from SBT/OST. The only cross-owner
# interaction GO participates in is being the OWNER whose CURRENT terms the
# annotator module imports (CROSS_IMPORT) and whose OBSOLETED ids the annotator
# still references (DANGLING_IMPORT).

glossary_changelog:
  - {date: 2026-06-18, op: lock, note: "faithful transcription of a current Gene Ontology slice (12 active terms, real GO IDs via QuickGO) for the OBO-scale DANGLING_IMPORT experiment; does NOT own the obsoleted GO:0000005 / GO:0006350 IDs -- the changed-definition-=>-new-ID (OBO Principle 19) condition the def_hash automates"}
