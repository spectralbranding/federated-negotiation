spec_version: 0.1.0
meta:
  title: 'Negotiating Vocabularies at Link Time: A Deterministic Six-Class Compatibility Check for Federated
    Ontology Modules'
  authors:
  - name: Dmitry Zharnikov
    orcid: 0009-0000-6893-9231
    affiliation: Independent Researcher
  doi: 10.5281/zenodo.20751395
  date: '2026-06-01'
  venue: Preprint
  license: CC-BY-4.0
  keywords:
  - ontology matching
  - link-time compatibility
  - content-addressed identity
  - vocabulary reconciliation
  - SSSOM
  - federated knowledge graphs
  - continuous integration
  - scholarly communication
  abstract: 'When two research programs use the same word for different concepts, or different words for
    the same concept, the incompatibility is usually discovered late, by a reader reconstructing it from
    prose. This paper transfers the link-time compatibility check compilers and package managers apply
    to code to scholarly vocabularies. If each work declares the terms it owns, imports, and refines as
    a content-addressed module, a federated linker classifies every cross-author interaction into exactly
    one of six classes, proposes a typed reconciliation in a standard mapping format, and fails a continuous-integration
    gate on the three unresolved classes, before either author reads the other''s prose. The classification
    is a deterministic function of two parsed module sets grounded in content-addressed definition-hash
    identity; it occupies the zero-uncertainty corner of the matching space and adds the reconciliation
    and gate layer matching omits. The author implements the method as a dependency-light tool and evaluates
    it on five real, independent vocabulary pairs that exercise the full class set: a clean intra-author
    federation, an incumbent vocabulary yielding a dangling reference, a cross-disciplinary vocabulary
    yielding a same-key conflict, a large biomedical ontology yielding dangling references grounded in
    its own term-obsoletion governance, and a cultural-heritage standard yielding cross-domain reuse at
    volume.'
claims:
- id: P1
  type: proposition
  statement: Cross-author terminological incompatibility in scholarship can be surfaced, classified, and
    assigned a reconciliation operation mechanically — at link time, before either author reads the other's
    prose — by a total classification function over two content-addressed module sets whose six classes
    partition every cross-owner interaction.
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P2
  type: proposition
  statement: 'The deterministic key+content-hash linker occupies a deliberately degenerate (zero-uncertainty)
    point of the ontology-matching space — syntactic, element-level, verification rather than discovery
    — and contributes the layer the matching literature leaves to post-hoc human judgment: interaction-classification
    + typed SKOS/SSSOM reconciliation + a fail-the-build CI gate. It does not compete with OAEI-style
    similarity/learned matchers; it is the zero-uncertainty baseline against which learned reconciliation
    methods are measured.'
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P3
  type: proposition
  statement: 'Content-addressed definition-hash identity gives the ''changed definition ⇒ new identity''
    rule mechanically and automatically: a term''s identity is the byte-hash of its definition, so a substantive
    definitional change yields a new identity with no human identifier-minting. This is the automatic,
    byte-exact strengthening of the OBO Foundry policy that a changed definition warrants a new identifier.'
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P4
  type: proposition
  statement: Recent conflict-resolution work (continuous/collaborative ontology engineering; learned/LLM
    knowledge-graph conflict resolution; RAG inter-context-conflict benchmarks) DETECTS or LEARNS conflicts
    post-hoc; the link-time linker PREVENTS their propagation deterministically at install time. The delta
    is preventive-vs-detective and deterministic-vs-learned, not a better matcher.
  testable: true
  tested_in_paper: true
  status: not_tested
- id: P5
  type: proposition
  statement: 'The method is a strict generalization of the single-author ontology linker: the single-author
    case is the degenerate federation where the two authors are one person at two times and the ''negotiation''
    collapses to a rebase against one''s own past self. The same parser reads modules in both regimes,
    so the single-author linker and the federated linker can never disagree on how a module is read or
    a definition hashed.'
  testable: true
  tested_in_paper: true
  status: not_tested
methodology:
  type: empirical
  design: 'The classification function classify(M_A, M_B): parse both authors'' modules with the SAME
    parser the single-author linker uses (build_ontology.Module + def_hash + _norm_ref); index each author
    into owns{term_key->def_hash} / imports{} / refines{term_key->narrows_to}; assign every cross-owner
    interaction to exactly one of six classes by a fixed decision rule over (shared-key equality of def_hash,
    refine-with/without-narrows_to, import-owned-by-other/neither). The reconciliation + gate map: each
    class is assigned (a) a SKOS mapping predicate, (b) a reconciliation operation in {lock, fork, rebase,
    merge} lifted from the single-author lock/fork/rebase/merge vocabulary, (c) an SSSOM justification
    (semapv:LexicalMatching for mechanical hash/lexical matches, semapv:ManualMappingCuration for proposals
    a human must confirm) + confidence, and (d) gate semantics: the three unresolved classes (CONFLICT,
    INCOMPATIBLE_REFINE, DANGLING_IMPORT) fail --gate. Integrity manifest: each shared SBT term''s def_hash
    (sha256 truncated to 16 hex) is recomputed at run time and checked equal to the live ontology graph
    value — the deterministic-experiment analogue of a fixed random seed (tamper-evidence anchor).'
  analysis:
    software: code/negotiate_modules.py (negotiate / index_author); code/build_ontology.py
      (Module, def_hash)
    method: Python 3.12 + uv; no network, no credentials
acceptance:
- claim_id: P1
  criterion: Holds if cross-author terminological incompatibility in scholarship can be surfaced, classified,
    and assigned a reconciliation operation mechanically — at link time, before either author reads the
    other's prose — by a total classification function over two content-addressed module sets whose six
    classes partition every cross-owner interaction.
  falsification: If more than a small fraction of real, well-formed scholarly vocabulary pairs in the
    wild contain a cross-owner interaction that the six classes cannot uniquely classify (an unclassifiable
    seventh class), the taxonomy is falsified.
- claim_id: P2
  criterion: 'Holds if the deterministic key+content-hash linker occupies a deliberately degenerate (zero-uncertainty)
    point of the ontology-matching space — syntactic, element-level, verification rather than discovery
    — and contributes the layer the matching literature leaves to post-hoc human judgment: interaction-classification
    + typed SKOS/SSSOM reconciliation + a fail-the-build CI gate.'
  falsification: If the classification or gate required a similarity threshold / probabilistic score to
    decide a class (i.e. were not a deterministic function of def_hash equality and declared import/refine
    edges), P2's zero-uncertainty positioning fails.
- claim_id: P3
  criterion: 'Holds if content-addressed definition-hash identity gives the ''changed definition ⇒ new
    identity'' rule mechanically and automatically: a term''s identity is the byte-hash of its definition,
    so a substantive definitional change yields a new identity with no human identifier-minting.'
  falsification: If two definitions that a human judges substantively different hash equal (a meaning-preserving
    paraphrase aside), or the identity rule required manual minting, P3 fails.
- claim_id: P4
  criterion: Holds if recent conflict-resolution work (continuous/collaborative ontology engineering;
    learned/LLM knowledge-graph conflict resolution; RAG inter-context-conflict benchmarks) DETECTS or
    LEARNS conflicts post-hoc; the link-time linker PREVENTS their propagation deterministically at install
    time.
  falsification: If a cited nearest-neighbor already performs deterministic link-time interaction-classification
    with typed reconciliation on author-declared modules, the novelty delta collapses.
- claim_id: P5
  criterion: 'Holds if the method is a strict generalization of the single-author ontology linker: the
    single-author case is the degenerate federation where the two authors are one person at two times
    and the ''negotiation'' collapses to a rebase against one''s own past self.'
  falsification: If the federated linker parsed a module differently from the single-author linker (different
    def_hash or owns/imports/refines reading), P5 fails.
