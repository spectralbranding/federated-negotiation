limitations:
- description: 'All three real module sets are AUTHOR-TRANSCRIBED: the SBT author transcribed the incumbent
    Aaker and cross-disciplinary Spence vocabularies from published sources, and each conflict is resolved
    only as a tool-PROPOSED curation. The independence is in each vocabulary''s provenance, not yet in
    a living co-author''s authoring act.'
  severity: major
  addressable: true
- description: The key-based linker surfaces same-key collisions and explicit import/refine edges; it
    does NOT detect latent cross-key synonymy (e.g. perception-cloud vs brand-image). The genuine SBT<->incumbent
    correspondences had to be hand-authored as a curated SSSOM. Cross-key reconciliation requires an embedding-assist
    or human-curation layer, deliberately out of scope.
  severity: moderate
  addressable: true
- description: Five hand-curated cases are an existence proof of full class coverage on real vocabularies,
    not a full-ontology robustness benchmark; the two added pairs (GO DANGLING at OBO scale, CIDOC-CRM
    CROSS_IMPORT at volume) transcribe representative 12-13-term slices, not whole ontologies. Full-ontology
    scale (thousands of terms) and transcription bias remain real external-validity threats the lead reviewer
    will raise.
  severity: moderate
  addressable: true
